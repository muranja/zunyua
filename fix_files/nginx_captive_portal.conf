# =====================================================================
# TurboNet — nginx_captive_portal.conf
# =====================================================================
# REPLACES: nginx_turbowifi_http.conf
#
# WHAT'S NEW vs the old config:
#   1. A "catch-all" server block (server_name _) that handles ANY
#      hostname — including all the OS probe domains we redirected via
#      MikroTik DNS static entries.
#   2. Probe-specific routes for Windows NCSI, Apple, Android, Samsung/LG
#      that return proper responses to trigger the OS captive portal popup.
#   3. The portal domain block (136.117.23.173) is preserved.
#
# HOW TO DEPLOY:
#   sudo cp nginx_captive_portal.conf /etc/nginx/sites-available/turbonet
#   sudo ln -sf /etc/nginx/sites-available/turbonet /etc/nginx/sites-enabled/turbonet
#   sudo nginx -t && sudo systemctl reload nginx
#
# Make sure port 80 is open on your VPS firewall:
#   sudo ufw allow 80/tcp
# =====================================================================


# =====================================================================
# BLOCK 1 — Catch-all for all OS probe domains
# =====================================================================
# This catches requests to: www.msftconnecttest.com, captive.apple.com,
# connectivitycheck.gstatic.com, www.samsung.com, etc. — because MikroTik
# DNS now points all those domains to this VPS IP (136.117.23.173).
#
# The strategy per OS:
#   Windows NCSI: expects /connecttest.txt to return "Microsoft Connect Test"
#                 If it gets anything else (like a redirect), Windows shows
#                 the "Sign in to network" notification. We return a redirect.
#   Apple:        expects /hotspot-detect.html or /success.html with specific
#                 content. We return a redirect with 302 to trigger the popup.
#   Android:      expects /generate_204 to return HTTP 204 No Content.
#                 We return 302 redirect instead to force the portal popup.
#   Samsung/LG TV:expects connectivity check URLs to fail or redirect.
# =====================================================================

server {
    listen 80 default_server;
    server_name _;  # matches ANY hostname not matched by other blocks

    # ---- Windows NCSI probes ----
    # Windows probes: GET /connecttest.txt  → expects "Microsoft Connect Test"
    # GET /redirect                          → expects redirect to msn.com
    # Returning a redirect here triggers the "Sign in to <network>" toast
    location = /connecttest.txt {
        return 302 http://136.117.23.173/;
    }
    location = /redirect {
        return 302 http://136.117.23.173/;
    }
    # Windows 10/11 also probes this path on ipv6.msftconnecttest.com
    location = /ncsi.txt {
        return 302 http://136.117.23.173/;
    }

    # ---- Apple / macOS / iOS / Apple TV probes ----
    # macOS: GET /hotspot-detect.html  → expects "<HTML><HEAD><TITLE>Success</TITLE></HEAD>..."
    # iOS:   GET /library/test/success.html
    # Returning a redirect triggers macOS/iOS captive network assistant popup
    location = /hotspot-detect.html {
        return 302 http://136.117.23.173/;
    }
    location = /library/test/success.html {
        return 302 http://136.117.23.173/;
    }
    location = /success.html {
        return 302 http://136.117.23.173/;
    }

    # ---- Android / Chrome / Google TV probes ----
    # Android: GET /generate_204  → expects HTTP 204 No Content
    # Returning 302 instead triggers the captive portal intent
    location = /generate_204 {
        return 302 http://136.117.23.173/;
    }
    # Chrome browser (Chromebook / Windows Chrome) also uses this
    location = /gen_204 {
        return 302 http://136.117.23.173/;
    }

    # ---- Linux NetworkManager probes ----
    location = /nm-check.txt {
        return 302 http://136.117.23.173/;
    }
    location = /check_network_status.txt {
        return 302 http://136.117.23.173/;
    }

    # ---- Firefox / Mozilla probes ----
    location = /canonical.html {
        return 302 http://136.117.23.173/;
    }
    location = /success.txt {
        return 302 http://136.117.23.173/;
    }

    # ---- Catch all other paths on unknown hostnames ----
    # Any HTTP request on any unrecognised domain → redirect to portal
    location / {
        return 302 http://136.117.23.173/;
    }
}


# =====================================================================
# BLOCK 2 — Your actual portal domain (136.117.23.173 on HTTP)
# =====================================================================
# This serves your React frontend and backend API directly.
# NOTE: Keep this as HTTP (port 80). If you redirect to HTTPS here,
# unauthenticated users (who can't reach the real internet yet) will
# get a cert error because their browser can't verify the SSL cert.
# The captive portal MUST be served over plain HTTP.
# =====================================================================

server {
    listen 80;
    server_name 136.117.23.173;

    # Let's Encrypt ACME challenge (for cert renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # React frontend
    location / {
        root /home/aspenhorgan254/turbonet/app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}


# =====================================================================
# BLOCK 3 — Also serve the portal on the raw VPS IP (136.117.23.173)
# =====================================================================
# The MikroTik login.html redirects to http://136.117.23.173/ directly.
# This ensures the IP address itself also serves the portal correctly.
# =====================================================================

server {
    listen 80;
    server_name 136.117.23.173;

    # Backend API
    location /api {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # React frontend
    location / {
        root /home/aspenhorgan254/turbonet/app/frontend/dist;
        try_files $uri $uri/ /index.html;
    }
}
