<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Ended</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-align: center;
        }

        .container {
            max-width: 400px;
            padding: 20px;
        }

        h1 {
            color: #f87171;
            margin-bottom: 15px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 20px;
        }

        a {
            display: inline-block;
            background: #22c55e;
            color: white;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Session Expired</h1>
        <p>Your internet session has ended. Purchase a new package to continue browsing.</p>
        <a href="$(link-login-only)">Get More Time</a>
    </div>
</body>

</html>
