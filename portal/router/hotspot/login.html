<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to TurboNet...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }

        .container {
            text-align: center;
            width: 100%;
            max-width: 400px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .log-box {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 14px;
            text-align: left;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            line-height: 1.7;
            max-height: 220px;
            overflow-y: auto;
        }

        .log-box .ok { color: #4ade80; }
        .log-box .info { color: #94a3b8; }
        .log-box .err { color: #f87171; }
        .log-box .warn { color: #fbbf24; }
        .log-box .step { color: #60a5fa; }
    </style>
</head>

<body>
    <div class="container">
        <div class="spinner" id="spinner"></div>
        <h1>TurboNet</h1>
        <p class="subtitle" id="subtitle">Connecting...</p>
        <div class="log-box" id="logbox"></div>
    </div>

    <script>
        var logbox = document.getElementById('logbox');
        var subtitle = document.getElementById('subtitle');
        var spinner = document.getElementById('spinner');

        function log(msg, cls) {
            cls = cls || 'info';
            var line = document.createElement('div');
            line.className = cls;
            line.textContent = msg;
            logbox.appendChild(line);
            logbox.scrollTop = logbox.scrollHeight;
        }

        function done(ok, msg) {
            spinner.style.display = 'none';
            subtitle.textContent = msg;
            subtitle.style.color = ok ? '#4ade80' : '#f87171';
        }

        // ---- MikroTik variables (replaced by router) ----
        var macRaw = "$(mac-esc)";
        var mac = macRaw;
        try { mac = decodeURIComponent(macRaw); } catch(e) {}

        var linkRaw = "$(link-orig-esc)";
        var link = linkRaw;
        try { link = decodeURIComponent(linkRaw); } catch(e) {}

        var loginUrl = "$(link-login-only)";
        var portalURL = "http://136.117.23.173";

        log('Device MAC: ' + (mac || 'NOT DETECTED'), mac ? 'ok' : 'err');
        log('Router login: ' + (loginUrl || 'none'), 'info');

        if (!mac || mac === '$(mac-esc)' || mac.indexOf(':') === -1) {
            log('MAC address missing or invalid', 'err');
            log('Make sure you are connected via WiFi', 'warn');
            done(false, 'Could not detect your device');
        } else {
            log('Building redirect URL...', 'step');

            var redirectURL = portalURL + "?mac=" + encodeURIComponent(mac);
            if (link && link !== "") {
                redirectURL += "&redirect=" + encodeURIComponent(link);
                log('Original link saved', 'info');
            }
            if (loginUrl && loginUrl !== "") {
                redirectURL += "&login_url=" + encodeURIComponent(loginUrl);
            }

            log('Target: ' + portalURL, 'info');
            log('Redirecting to portal...', 'step');

            setTimeout(function () {
                log('Opening portal...', 'ok');
                window.location.href = redirectURL;
            }, 800);
        }
    </script>
</body>

</html>
