<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurboNet</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;display:flex;align-items:center;justify-content:center;height:100vh;padding:16px}
        .c{text-align:center;width:100%;max-width:360px}
        .s{width:40px;height:40px;border:3px solid rgba(255,255,255,.1);border-top-color:#22c55e;border-radius:50%;animation:r 1s linear infinite;margin:0 auto 16px}
        @keyframes r{to{transform:rotate(360deg)}}
        h1{font-size:1.3rem;margin-bottom:6px}
        .t{color:#94a3b8;font-size:.85rem;margin-bottom:16px}
        .l{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);border-radius:10px;padding:10px;text-align:left;font:11px/1.6 monospace;max-height:180px;overflow-y:auto}
        .ok{color:#4ade80}.e{color:#f87171}.w{color:#fbbf24}.i{color:#94a3b8}.st{color:#60a5fa}
    </style>
</head>
<body>
    <div class="c">
        <div class="s" id="sp"></div>
        <h1>TurboNet</h1>
        <p class="t" id="st">Connecting...</p>
        <div class="l" id="lg"></div>
    </div>
    <script>
        var lg=document.getElementById('lg'),st=document.getElementById('st'),sp=document.getElementById('sp');
        function log(m,c){var d=document.createElement('div');d.className=c||'i';d.textContent=m;lg.appendChild(d);lg.scrollTop=lg.scrollHeight}
        function done(ok,m){sp.style.display='none';st.textContent=m;st.style.color=ok?'#4ade80':'#f87171'}

        // MikroTik template variables (replaced by router at serve-time)
        var macRaw="$(mac-esc)",linkRaw="$(link-orig-esc)",loginUrl="$(link-login-only)";
        var mac=macRaw,link=linkRaw;
        try{mac=decodeURIComponent(macRaw)}catch(x){}
        try{link=decodeURIComponent(linkRaw)}catch(x){}

        var portal="http://136.109.224.75";

        log('MAC: '+(mac||'?'),mac&&mac.indexOf(':')!==-1?'ok':'e');

        if(!mac||mac==='$(mac-esc)'||mac.indexOf(':')===-1){
            log('MAC missing — connect via WiFi','e');
            done(false,'Device not detected');
        }else{
            var url=portal+'?mac='+encodeURIComponent(mac);
            if(link&&link!=='$(link-orig-esc)')url+='&redirect='+encodeURIComponent(link);
            if(loginUrl&&loginUrl!=='$(link-login-only)')url+='&login_url='+encodeURIComponent(loginUrl);
            log('Redirecting...','st');
            window.location.replace(url);
        }
    </script>
</body>
</html>
