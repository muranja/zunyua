<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connecting to TurboNet...</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }

        .loader {
            text-align: center;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top-color: #22c55e;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 0.9rem;
        }
    </style>
    <script>
        var macRaw = "$(mac-esc)";
        var mac = macRaw;
        try { mac = decodeURIComponent(macRaw); } catch(e) {}

        var linkRaw = "$(link-orig-esc)";
        var link = linkRaw;
        try { link = decodeURIComponent(linkRaw); } catch(e) {}

        var loginUrl = "$(link-login-only)";

        var PORTAL = "http://136.117.23.173";
        var API = PORTAL + "/api";

        function go() {
            var sid = Math.random().toString(36).slice(2) + Date.now().toString(36);

            try { sessionStorage.setItem('tn_mac', mac); } catch(e) {}
            try { if (loginUrl) sessionStorage.setItem('tn_lurl', loginUrl); } catch(e) {}

            var body = JSON.stringify({
                session: sid,
                mac: mac,
                loginUrl: loginUrl || '',
                redirect: link || ''
            });

            fetch(API + '/register-mac', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: body,
                mode: 'no-cors'
            }).catch(function(){});

            setTimeout(function() {
                window.location.href = PORTAL + '/?s=' + sid;
            }, 400);
        }

        window.onload = go;
    </script>
</head>

<body>
    <div class="loader">
        <div class="spinner"></div>
        <h1>Connecting to TurboNet</h1>
        <p>Taking you to the portal...</p>
    </div>
</body>

</html>
