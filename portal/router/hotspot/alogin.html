<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connected</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#f8fafc;display:flex;align-items:center;justify-content:center;height:100vh;padding:16px}
        .c{text-align:center;width:100%;max-width:360px;background:rgba(30,41,59,.4);border:1px solid rgba(255,255,255,.08);padding:32px 24px;border-radius:20px;box-shadow:0 16px 32px rgba(0,0,0,.4)}
        .ico{width:56px;height:56px;background:rgba(16,185,129,.1);border:2px solid rgba(16,185,129,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .ico svg{width:28px;height:28px;color:#10b981}
        h2{font-size:1.2rem;margin-bottom:6px}
        p{color:#94a3b8;font-size:.85rem;margin-bottom:20px;line-height:1.4}
        button{background:#3b82f6;color:#fff;border:none;padding:12px;border-radius:10px;font-weight:700;font-size:15px;cursor:pointer;width:100%;transition:background .15s}
        button:active{background:#2563eb;transform:scale(.98)}
    </style>
</head>
<body onload="go()">
    <div class="c">
        <div class="ico">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2>Connected!</h2>
        <p>You're online. This window will close automatically.</p>
        <button onclick="go()">Close Window</button>
    </div>
    <script>
        function go(){
            setTimeout(function(){
                window.close();
                setTimeout(function(){
                    var ua=navigator.userAgent||'';
                    if(/iPad|iPhone|iPod|Mac/i.test(ua))location.href='http://captive.apple.com/hotspot-detect.html';
                    else if(/Android/i.test(ua))location.href='http://connectivitycheck.gstatic.com/generate_204';
                    else location.href='http://www.google.com';
                },400);
            },1200);
        }
    </script>
</body>
</html>
