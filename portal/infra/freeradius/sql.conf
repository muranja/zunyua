# =====================================================
# FreeRADIUS SQL Module Configuration
# Location: /etc/freeradius/3.0/mods-available/sql
# =====================================================

sql {
    # Database driver
    driver = "rlm_sql_mysql"
    dialect = "mysql"
    
    # Connection info - UPDATE THESE!
    server = "localhost"
    port = 3306
    login = "turbonet_user"
    password = "YOUR_DATABASE_PASSWORD"
    
    # Database name
    radius_db = "turbonet"
    
    # Table names (standard RADIUS tables)
    # These should exist in your database
    acct_table1 = "radacct"
    acct_table2 = "radacct"
    postauth_table = "radpostauth"
    authcheck_table = "radcheck"
    authreply_table = "radreply"
    groupcheck_table = "radgroupcheck"
    groupreply_table = "radgroupreply"
    usergroup_table = "radusergroup"
    
    # Read groups
    read_groups = yes
    
    # Remove stale sessions on startup
    delete_stale_sessions = yes
    
    # SQL queries - use defaults
    $INCLUDE ${modconfdir}/${.:name}/main/${dialect}/queries.conf
    
    # Connection pool settings
    pool {
        start = 5
        min = 4
        max = 32
        spare = 3
        uses = 0
        lifetime = 0
        idle_timeout = 60
    }
    
    # Read clients from database (optional)
    read_clients = no
    
    # Log SQL queries (for debugging)
    logfile = ${logdir}/sqllog.sql
}
