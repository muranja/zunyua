# =====================================================
# FreeRADIUS clients.conf - MikroTik Configuration
# Location: /etc/freeradius/3.0/clients.conf
# =====================================================

# Add this at the end of clients.conf

client mikrotik {
    # Your MikroTik's public IP address
    # If MikroTik is behind NAT, use its public IP
    ipaddr = 0.0.0.0/0
    
    # The shared secret - MUST MATCH MikroTik's RADIUS secret!
    # Generate one: openssl rand -hex 16
    secret = TurboNetSecret2024
    
    # Short name for logs
    shortname = turbonet-router
    
    # Enable NAS type for MikroTik
    nastype = mikrotik
    
    # Require Message-Authenticator
    require_message_authenticator = yes
}

# If you have a specific public IP for your MikroTik:
# client mikrotik-main {
#     ipaddr = 41.89.xxx.xxx
#     secret = TurboNetSecret2024
#     shortname = turbonet-main
#     nastype = mikrotik
# }
