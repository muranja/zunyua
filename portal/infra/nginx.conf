server {
    listen 80;
    server_name login.turbonet.co.ke;

    # Redirect HTTP to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name login.turbonet.co.ke;

    # SSL Certificates (Certbot will manage these)
    # ssl_certificate /etc/letsencrypt/live/login.turbonet.co.ke/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/login.turbonet.co.ke/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Frontend (Static Files / React App)
    location / {
        root /var/www/turbonet/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API (Reverse Proxy)
    location /api/ {
        proxy_pass http://localhost:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
